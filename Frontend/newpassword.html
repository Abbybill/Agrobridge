<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set New Password</title>
</head>
<body>

    <div>
        <h1>AgroBridge</h1> 

        <h2>Set a new password</h2>

        <p>Your password must be at least 8 characters long and contain at least one uppercase letter and one number.</p>

        <form action="/update-password" method="POST">
            
            <input type="hidden" name="reset_token" value="example-secure-token-12345">

            <div>
                <label for="new_password">New Password</label>
                <input 
                    type="password" 
                    id="new_password" 
                    name="new_password" 
                    placeholder="Enter new password" 
                    minlength="8" 
                    required>
            </div>

            <div>
                <label for="confirm_password">Confirm New Password</label>
                <input 
                    type="password" 
                    id="confirm_password" 
                    name="confirm_password" 
                    placeholder="Confirm new password" 
                    minlength="8" 
                    required>
            </div>

            <button type="submit">
                Reset Password
            </button>
        </form>

        <p>
            <a href="/login">Back To Login</a>
        </p>
    </div>

</body>
</html>
